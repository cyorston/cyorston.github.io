<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cole Yorston | Data Scientist Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>

/* ===== GLOBAL ===== */
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0e0e0e;
  color:#f2f2f2;
}

main { margin-left:100px; }

/* ===== SIDEBAR ===== */
.sidebar {
  position:fixed;
  width:80px;
  height:100%;
  background:#1b1b1b;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:20px;
  gap:25px;
}

.sidebar a {
  color:#ffd166;
  font-size:1.5em;
}

/* ===== HERO ===== */
.hero {
  text-align:center;
  padding:60px 20px;
}

.hero img {
  width:120px;
  border-radius:50%;
  border:3px solid #ffd166;
}

.hero h1 { color:#ffd166; }

.typing { color:#06d6a0; height:30px; }

/* ===== SECTIONS ===== */
section { padding:60px 10%; }

h2 {
  color:#ffd166;
  border-bottom:2px solid #ffd166;
  display:inline-block;
}

/* ===== TIMELINE (RESTORED) ===== */

.timeline {
  position:relative;
  max-width:1000px;
  margin:auto;
}

.timeline-container {
  position:relative;
  width:50%;
  padding:20px;
  opacity:0;
  transform:translateY(50px);
  transition:0.6s;
}

.timeline-container.visible {
  opacity:1;
  transform:translateY(0);
}

.timeline-container.left { left:0; }
.timeline-container.right { left:50%; }

.timeline-content {
  position:relative;
  background:#111;
  border-radius:10px;
  overflow:hidden;
}

.timeline-banner {
  width:100%;
  height:160px;
  object-fit:cover;
  opacity:0.3;
}

.timeline-content h3, .timeline-content p {
  position:relative;
  padding:10px 15px;
}

/* ===== PROJECT GRID ===== */

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card {
  background:#1b1b1b;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
}

/* ===== MODAL ===== */

.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#111;
  padding:20px;
  width:80%;
}

.close { cursor:pointer; float:right; }

@media(max-width:768px){
  .timeline-container { width:100%; left:0 !important; }
}

</style>

</head>

<body>

<div class="sidebar">
<a href="mailto:yorston.cole@gmail.com"><i class="fa-solid fa-envelope"></i></a>
<a href="assets/Cole_Yorston_Resume.pdf"><i class="fa-solid fa-file-arrow-down"></i></a>
<a href="https://github.com/cyorston"><i class="fab fa-github"></i></a>
</div>

<main>

<!-- HERO -->

<div class="hero">
<img src="assets/img/Headshot.png">
<h1>Cole Yorston</h1>
<div id="typing" class="typing"></div>
</div>

<!-- CAREER -->

<section>
<h2>Career Timeline</h2>
<div class="timeline" id="careerTimeline"></div>
</section>

<!-- EDUCATION -->

<section>
<h2>Education</h2>
<div class="timeline" id="educationTimeline"></div>
</section>

<!-- PROJECTS -->

<section>
<h2>Projects</h2>
<div class="grid" id="projects"></div>
</section>

<!-- CERTIFICATIONS -->

<section>
<h2>Certifications</h2>
<div class="grid">
<div class="card">Databricks Generative AI Fundamentals</div>
<div class="card">Databricks GenAI App Dev</div>
<div class="card">NVIDIA NLP</div>
<div class="card">Google Advanced Data Analytics</div>
<div class="card">EIT</div>
</div>
</section>

</main>

<!-- MODAL -->

<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✕</span>
<div id="modalBody"></div>
</div>
</div>

<script>

/* ===== TIMELINE DATA ===== */

const careerData = [
{side:"left", img:"assets/img/ge_banner.jpg", title:"GE Vernova (2025–Present)", desc:"Lead Test Engineer – Dynamic Systems"},
{side:"right", img:"assets/img/textron_banner.jpg", title:"Textron (2024–2025)", desc:"Data Scientist"},
{side:"left", img:"assets/img/textron_banner.jpg", title:"Textron (2023–2024)", desc:"Test Engineer"},
{side:"right", img:"assets/img/uga_banner.jpg", title:"UGA (2022–2023)", desc:"Research Assistant"}
];

const educationData = [
{side:"left", img:"assets/img/gt_banner.jpg", title:"Georgia Tech", desc:"MS Analytics (2025–Present)"},
{side:"right", img:"assets/img/uga_banner.jpg", title:"UGA", desc:"MS Engineering (2022–2023)"},
{side:"left", img:"assets/img/uga_banner.jpg", title:"UGA", desc:"BSME (2018–2022)"}
];

function populateTimeline(id,data){
  const container=document.getElementById(id);
  data.forEach(d=>{
    const div=document.createElement("div");
    div.className="timeline-container "+d.side;
    div.innerHTML=`
      <div class="timeline-content">
        <img src="${d.img}" class="timeline-banner">
        <h3>${d.title}</h3>
        <p>${d.desc}</p>
      </div>`;
    container.appendChild(div);
  });
}

/* ===== ANIMATION ===== */
function animateTimeline(){
  document.querySelectorAll(".timeline-container").forEach(el=>{
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(e.isIntersecting) e.target.classList.add("visible");
      });
    });
    obs.observe(el);
  });
}

/* ===== PROJECTS ===== */
const projects = [
{name:"SyllabusAI",desc:"MOOC generator"},
{name:"BayesBall",desc:"Bayesian MLB projections"},
{name:"Cognilingo",desc:"AI language learning"},
{name:"DS Career Assistant",desc:"Career optimization tool"}
];

projects.forEach(p=>{
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<h3>${p.name}</h3><p>${p.desc}</p>`;
  document.getElementById("projects").appendChild(div);
});

/* ===== TYPING ===== */
const roles=["Data Scientist","ML Engineer","Bayesian Modeler"];
let i=0,j=0,del=false;

function type(){
let t=roles[i];
document.getElementById("typing").innerText=t.substring(0,j);
if(!del){j++; if(j>t.length){del=true; setTimeout(type,1000); return;}}
else{j--; if(j===0){del=false;i=(i+1)%roles.length;}}
setTimeout(type,80);
}
type();

/* ===== INIT ===== */
populateTimeline("careerTimeline",careerData);
populateTimeline("educationTimeline",educationData);
setTimeout(animateTimeline,500);

</script>

</body>
</html>
