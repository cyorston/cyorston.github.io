<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cole Yorston | Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== GLOBAL ===== */
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0e0e0e;
  color:#f2f2f2;
}

main { margin-left:100px; }

/* ===== SIDEBAR ===== */
.sidebar {
  position:fixed;
  width:80px;
  height:100%;
  background:#1b1b1b;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:20px;
  gap:25px;
}

.sidebar a { color:#ffd166; font-size:1.5em; }

/* ===== HERO ===== */
.hero {
  text-align:center;
  padding:60px 20px;
}

.hero img {
  width:120px;
  border-radius:50%;
  border:3px solid #ffd166;
}

.hero h1 { color:#ffd166; }

.typing { color:#06d6a0; height:30px; }

/* ===== SECTION ===== */
section { padding:60px 8%; }

h2 {
  color:#ffd166;
  border-bottom:2px solid #ffd166;
  display:inline-block;
  margin-bottom:20px;
}

/* ===== TIMELINE SLIDER ===== */

.timeline-wrapper {
  position:relative;
}

.timeline-scroll {
  display:flex;
  gap:20px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  padding:20px 0;
}

.timeline-scroll::-webkit-scrollbar { display:none; }

.timeline-card {
  min-width:320px;
  max-width:320px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
  overflow:hidden;
  position:relative;
  scroll-snap-align:center;
  transition:0.4s;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.08);
}

.timeline-card:hover {
  transform:scale(1.08);
  border-color:#ffd166;
}

/* banner */
.timeline-card img {
  width:100%;
  height:160px;
  object-fit:cover;
  opacity:0.35;
}

/* content */
.timeline-content {
  padding:15px;
}

.timeline-content h3 {
  color:#ffd166;
  margin:0;
}

.metrics {
  margin-top:10px;
  font-size:13px;
  opacity:0;
  transition:0.3s;
}

.timeline-card:hover .metrics {
  opacity:1;
}

/* arrows */
.arrow {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#111;
  border:1px solid #333;
  padding:10px;
  cursor:pointer;
  z-index:10;
}

.arrow.left { left:-10px; }
.arrow.right { right:-10px; }

/* ===== PROJECT GRID ===== */

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card {
  background:#1b1b1b;
  padding:15px;
  border-radius:10px;
}

/* ===== MODAL ===== */

.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#111;
  padding:20px;
  width:80%;
}

.close { float:right; cursor:pointer; }

</style>

</head>

<body>

<div class="sidebar">
<a href="mailto:yorston.cole@gmail.com"><i class="fa-solid fa-envelope"></i></a>
<a href="assets/Cole_Yorston_Resume.pdf"><i class="fa-solid fa-file-arrow-down"></i></a>
<a href="https://github.com/cyorston"><i class="fab fa-github"></i></a>
</div>

<main>

<!-- HERO -->

<div class="hero">
<img src="assets/img/Headshot.png">
<h1>Cole Yorston</h1>
<div id="typing" class="typing"></div>
</div>

<!-- CAREER -->

<section>
<h2>Career Timeline</h2>

<div class="timeline-wrapper">
<div class="arrow left" onclick="scrollTimeline('career',-1)">◀</div>
<div class="arrow right" onclick="scrollTimeline('career',1)">▶</div>

<div class="timeline-scroll" id="careerTimeline"></div>
</div>

</section>

<!-- EDUCATION -->

<section>
<h2>Education</h2>

<div class="timeline-wrapper">
<div class="arrow left" onclick="scrollTimeline('edu',-1)">◀</div>
<div class="arrow right" onclick="scrollTimeline('edu',1)">▶</div>

<div class="timeline-scroll" id="eduTimeline"></div>
</div>

</section>

<!-- PROJECTS -->

<section>
<h2>Projects</h2>
<div class="grid">
<div class="card"><h3>SyllabusAI</h3><p>MOOC generator</p></div>
<div class="card"><h3>BayesBall</h3><p>Bayesian MLB model</p></div>
<div class="card"><h3>Cognilingo</h3><p>AI language learning</p></div>
<div class="card"><h3>Career Assistant</h3><p>DS roadmap tool</p></div>
</div>
</section>

<!-- CERTS -->

<section>
<h2>Certifications</h2>
<div class="grid">
<div class="card">Databricks GenAI Fundamentals</div>
<div class="card">Databricks App Dev</div>
<div class="card">NVIDIA NLP</div>
<div class="card">Google Data Analytics</div>
</div>
</section>

</main>

<script>

/* ===== DATA ===== */

const career = [
{
img:"assets/img/ge_banner.jpg",
title:"GE Vernova",
desc:"Lead Test Engineer",
metrics:["Built advanced analytics pipelines","Gas turbine diagnostics","Real-time ML"]
},
{
img:"assets/img/textron_banner.jpg",
title:"Textron DS",
desc:"Data Scientist",
metrics:["Anomaly detection systems","ETL pipelines","Production dashboards"]
},
{
img:"assets/img/textron_banner.jpg",
title:"Textron",
desc:"Test Engineer",
metrics:["Automation frameworks","Data validation","Visualization tools"]
},
{
img:"assets/img/uga_banner.jpg",
title:"UGA",
desc:"Research Assistant",
metrics:["2 publications","IoT ML pipelines","Real-time classification"]
}
];

const edu = [
{
img:"assets/img/gt_banner.jpg",
title:"Georgia Tech",
desc:"MS Analytics",
metrics:["Bayesian modeling","ML systems"]
},
{
img:"assets/img/uga_banner.jpg",
title:"UGA",
desc:"MS Engineering",
metrics:["IoT + ML","Research"]
},
{
img:"assets/img/uga_banner.jpg",
title:"UGA",
desc:"BSME",
metrics:["Dynamics","Thermo","Signal processing"]
}
];

/* ===== BUILD CARDS ===== */

function buildTimeline(id,data){
const container=document.getElementById(id);

data.forEach(d=>{
const div=document.createElement("div");
div.className="timeline-card";

div.innerHTML=`
<img src="${d.img}">
<div class="timeline-content">
<h3>${d.title}</h3>
<p>${d.desc}</p>
<div class="metrics">${d.metrics.join("<br>")}</div>
</div>`;

container.appendChild(div);
});
}

/* ===== SCROLL ===== */

function scrollTimeline(type,dir){
const el = document.getElementById(type==="career"?"careerTimeline":"eduTimeline");
el.scrollBy({left:dir*340,behavior:"smooth"});
}

/* ===== TYPING ===== */

const roles=["Data Scientist","ML Engineer","Bayesian Modeler"];
let i=0,j=0,del=false;

function type(){
let t=roles[i];
document.getElementById("typing").innerText=t.substring(0,j);
if(!del){j++; if(j>t.length){del=true; setTimeout(type,1000); return;}}
else{j--; if(j===0){del=false;i=(i+1)%roles.length;}}
setTimeout(type,80);
}
type();

/* INIT */
buildTimeline("careerTimeline",career);
buildTimeline("eduTimeline",edu);

</script>

</body>
</html>
